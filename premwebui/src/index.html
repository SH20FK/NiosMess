<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiosMess Premium</title>
    <link rel="stylesheet" href="./css/main.css">
</head>

<body class="aurora-bg">
    <div id="app">
        <!-- App content will be injected or defined here -->
        <header class="app-header glass">
            <div class="logo">NiosMess</div>
        </header>
        <main class="app-layout">
            <aside class="sidebar glass">
                <div class="sidebar-header">
                    <button class="icon-btn menu-trigger">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="search-bar-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
                            stroke-width="2" fill="none">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" placeholder="Поиск..." class="search-input">
                    </div>
                </div>

                <nav class="sidebar-menu hidden" id="sidebar-menu">
                    <div class="menu-item"><span class="icon">👤</span> Мой профиль</div>
                    <div class="menu-item"><span class="icon">🔖</span> Избранное</div>
                    <div class="menu-item"><span class="icon">👥</span> Создать группу</div>
                    <div class="menu-item"><span class="icon">📢</span> Создать канал</div>
                    <div class="menu-item"><span class="icon">⚙️</span> Настройки</div>
                    <div class="menu-item"><span class="icon">🎵</span> Музыка</div>
                    <div class="menu-item"><span class="icon">🎨</span> Персонализация</div>
                    <div class="menu-item"><span class="icon">❓</span> Помощь</div>
                    <div class="menu-item"><span class="icon">ℹ️</span> О NiosMess</div>
                </nav>

                <div class="chat-list" id="chat-list">
                    <!-- Chats will be injected here -->
                </div>
            </aside>
            <section class="chat-view glass" id="chat-view">
                <!-- Empty State (Default) -->
                <div class="empty-state" id="empty-state">
                    <div class="fox-logo-container">
                        <span style="font-size: 80px; filter: drop-shadow(0 0 20px rgba(255,165,0,0.4));">🦊</span>
                    </div>
                    <h2>Выберите чат</h2>
                    <p>Начните общение, выбрав контакт из списка</p>
                </div>

                <!-- Chat Content (Hidden by default) -->
                <div class="chat-content hidden" id="chat-content"
                    style="display: none; flex: 1; flex-direction: column; overflow: hidden;">
                    <header class="chat-header glass">
                        <div class="chat-avatar">N</div>
                        <div class="chat-info">
                            <div class="chat-name">NiosMess Team</div>
                            <div class="chat-status">online</div>
                        </div>
                        <div class="chat-actions">
                            <button class="icon-btn"><span class="material-icon">search</span></button>
                            <button class="icon-btn"><span class="material-icon">more_vert</span></button>
                        </div>
                    </header>

                    <div class="messages-container" id="messages-container">
                        <!-- Messages will go here -->
                        <div class="message-bubble incoming">
                            Добро пожаловать в новый NiosMess! 🦊
                            <div class="message-time">12:00</div>
                        </div>
                    </div>

                    <div class="chat-input-area glass">
                        <button class="icon-btn">📎</button>
                        <div class="chat-input-wrapper">
                            <textarea class="chat-input" placeholder="Написать сообщение..." rows="1"></textarea>
                        </div>
                        <button class="icon-btn btn-primary" style="width: 48px; height: 48px;">➤</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
