name: pulse_flutter
description: "NiosMess — Fast and secure messaging for everyone."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 3.0.0+1

environment:
  sdk: ^3.10.7

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  flutter_animate: ^4.5.2
  emoji_picker_flutter: ^4.0.0
  shared_preferences: ^2.5.3
  http: ^1.5.0
  intl: ^0.20.2
  timezone: ^0.11.0
  file_picker: ^11.0.2
  cached_network_image: ^3.4.1
  dynamic_color: ^1.7.0
  video_player: ^2.9.2
  open_file: ^3.5.10
  path_provider: ^2.1.5
  just_audio: ^0.9.37
  audio_session: ^0.1.25
  audio_waveforms: ^1.0.5
  photo_view: ^0.15.0
  chewie: ^1.8.1
  camera: ^0.11.0
  audioplayers: ^6.1.0
  record: ^5.1.0
  lottie: ^3.3.3
  flutter_file_dialog: ^3.0.2
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  flutter_secure_storage: ^10.0.0
  photo_manager: ^3.7.1
  connectivity_plus: ^7.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cryptography: ^2.9.0
  loading_indicator_m3e: ^0.1.1
  uuid: ^4.5.1
  flutter_m3shapes: ^1.0.0+2
  web_socket_channel: ^3.0.3
  universal_io: ^2.3.1
  animations: ^2.2.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  app_links: ^6.3.0
  flutter_markdown: ^0.7.7+1
  local_auth: ^2.3.0
  flutter_image_compress: ^2.3.4
  flutter_foreground_task: ^8.0.0
  android_intent_plus: ^5.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.3.0
  permission_handler: ^11.3.1
  image: ^4.1.4
  opus_codec_dart: ^3.0.5
  opus_codec: ^3.0.5
  mesh_gradient: ^1.3.8
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating certain ones.
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  msix: ^3.16.13
  flutter_launcher_icons: ^0.14.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/sounds/
    - assets/developers/
    - assets/lottie/
    - assets/icons/
    - assets/svg/
    - assets/legal/
    - assets/NiosMess_icon.png

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Variable.ttf
          weight: 400
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Variable.ttf
          weight: 500
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Variable.ttf
          weight: 600
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Variable.ttf
          weight: 700
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Variable.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 700

dependency_overrides:
  record_linux: 1.3.1

msix_config:
  display_name: "NiosMess"
  publisher_display_name: "NiosMess Team"
  publisher: "CN=NiosMess Team"
  identity_name: "NiosMess.App"
  msix_version: 1.0.0.0
  logo_path: "assets/NiosMess_icon.png"
  output_name: "NiosMess"
  output_path: "build/windows/x64/runner/Release"
  certificate_path: "NiosMessCert.pfx"
  certificate_password: "123456"
  capabilities: "internetClient, internetClientServer, privateNetworkClientServer"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/niosmess_logo_tintable.png"
  remove_alpha_ios: true

  adaptive_icon_foreground: "assets/icons/niosmess_logo_tintable.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "assets/icons/niosmess_logo_tintable.png"
