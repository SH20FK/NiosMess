<style>
/* ═══════════════════════ iOS 26 LIQUID GLASS ═══════════════════════ */
@keyframes meshMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes orbSlow { 0%,100%{transform:translate(0,0) rotate(0deg) scale(1)} 33%{transform:translate(20px,-30px) rotate(5deg) scale(1.05)} 66%{transform:translate(-15px,20px) rotate(-3deg) scale(0.95)} }
@keyframes subtleFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes typingPulse { 0%,80%,100%{opacity:0.3;transform:translateY(0)} 40%{opacity:1;transform:translateY(-3px)} }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;color:#f5f5f7;background:#000}

body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 800px 500px at 15% 30%, rgba(120,80,255,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 700px 600px at 85% 20%, rgba(50,180,255,0.3) 0%, transparent 55%),
    radial-gradient(ellipse 900px 500px at 50% 80%, rgba(0,210,180,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 500px 400px at 70% 70%, rgba(255,100,180,0.2) 0%, transparent 50%),
    radial-gradient(ellipse 600px 500px at 30% 60%, rgba(80,120,255,0.2) 0%, transparent 55%),
    linear-gradient(160deg, #0a0a1a 0%, #0d0d2b 40%, #0a0a1a 100%);
  background-size:120% 120%, 100% 100%, 110% 110%, 90% 90%, 100% 100%, 100% 100%;
  animation:meshMove 30s ease-in-out infinite}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle 300px at 20% 40%, rgba(100,200,255,0.15), transparent),
    radial-gradient(circle 250px at 75% 60%, rgba(200,100,255,0.12), transparent),
    radial-gradient(circle 200px at 50% 20%, rgba(100,255,200,0.1), transparent);
  animation:orbSlow 20s ease-in-out infinite;mix-blend-mode:screen}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

:root{
  --glass:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.1);
  --glass-highlight:rgba(255,255,255,0.15);
  --glass-active:rgba(255,255,255,0.1);
  --accent:#64d2ff;
  --accent-dim:rgba(100,210,255,0.12);
  --accent-glow:rgba(100,210,255,0.35);
  --green:#30d158;
  --red:#ff453a;
  --orange:#ff9f0a;
  --purple:#bf5af2;
  --pink:#ff375f;
  --teal:#5ac8fa;
  --indigo:#5856d6;
  --text:#f5f5f7;
  --text2:#a1a1a6;
  --text3:#636366;
  --radius:16px;
  --radius-lg:22px}

/* ── Auth Screen ── */
#auth-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.5s ease}
.auth-card{position:relative;z-index:1;width:100%;max-width:400px;margin:16px;
  background:linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.04) 100%);
  backdrop-filter:blur(60px) saturate(200%) brightness(1.05);
  -webkit-backdrop-filter:blur(60px) saturate(200%) brightness(1.05);
  border:1px solid rgba(255,255,255,0.18);border-radius:24px;padding:40px 32px;
  box-shadow:0 40px 100px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(255,255,255,0.05);
  animation:scaleIn 0.5s cubic-bezier(0.16,1,0.3,1);overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent)}
.auth-logo{font-size:28px;font-weight:800;letter-spacing:-0.5px;text-align:center;margin-bottom:4px;
  background:linear-gradient(135deg, #64d2ff, #5ac8fa, #64d2ff);background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:subtleFloat 4s ease-in-out infinite, meshMove 6s ease-in-out infinite}
.auth-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;font-family:'SF Mono',monospace;letter-spacing:0.3px}
.auth-tabs{display:flex;gap:3px;margin-bottom:20px;background:rgba(0,0,0,0.3);border-radius:12px;padding:3px;border:1px solid rgba(255,255,255,0.08)}
.auth-tab{flex:1;padding:9px;text-align:center;cursor:pointer;border-radius:10px;font-size:13px;font-weight:600;color:var(--text2);transition:all 0.25s ease;border:none;background:transparent;font-family:inherit}
.auth-tab:hover{color:var(--text)}
.auth-tab.active{background:rgba(255,255,255,0.12);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.15)}
.auth-input{width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:all 0.25s ease;font-family:inherit;backdrop-filter:blur(10px)}
.auth-input::placeholder{color:var(--text3)}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(100,210,255,0.15);background:rgba(0,0,0,0.35)}
.auth-input.error{border-color:var(--red)!important}
.auth-btn{width:100%;padding:13px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.25s ease;font-family:inherit;color:#fff;
  background:linear-gradient(135deg, rgba(100,210,255,0.4), rgba(90,200,250,0.35));border:1px solid rgba(100,210,255,0.3);
  box-shadow:0 4px 16px rgba(100,210,255,0.2), inset 0 1px 0 rgba(255,255,255,0.2)}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(100,210,255,0.3), inset 0 1px 0 rgba(255,255,255,0.25)}
.auth-btn:active{transform:scale(0.97)}
.auth-btn:disabled{opacity:0.4;pointer-events:none}
.auth-btn.danger{background:linear-gradient(135deg, rgba(255,69,58,0.3), rgba(255,69,58,0.2));border-color:rgba(255,69,58,0.3);box-shadow:0 4px 16px rgba(255,69,58,0.15)}
.auth-step{display:none;flex-direction:column;gap:12px}
.auth-step.active{display:flex;animation:fadeUp 0.3s ease}
.auth-err{font-size:13px;color:var(--red);padding:10px 14px;background:rgba(255,69,58,0.1);border-radius:12px;border:1px solid rgba(255,69,58,0.2);animation:fadeUp 0.2s ease}
.code-boxes{display:flex;gap:10px;justify-content:center}
.code-box{width:48px;height:56px;text-align:center;font-size:24px;font-weight:700;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:var(--text);outline:none;transition:all 0.25s ease;font-family:'SF Mono',monospace;backdrop-filter:blur(10px)}
.code-box:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(100,210,255,0.15);transform:scale(1.05)}

/* ── App Layout ── */
#app{display:none;width:100%;height:100%;flex-direction:column}
#app.visible{display:flex;animation:fadeIn 0.4s ease}
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:relative;z-index:10;
  background:linear-gradient(180deg, rgba(30,30,30,0.85) 0%, rgba(30,30,30,0.7) 100%);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border-bottom:0.5px solid rgba(255,255,255,0.1)}
.topbar-logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--accent)}
.icon-btn{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s ease}
.icon-btn:hover{background:rgba(255,255,255,0.14)}
.icon-btn:active{transform:scale(0.9)}
.icon-btn svg{width:16px;height:16px;fill:currentColor}

.sidebar{width:320px;min-width:320px;display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg, rgba(28,28,30,0.92) 0%, rgba(20,20,22,0.95) 100%);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border-right:0.5px solid rgba(255,255,255,0.08)}
.sidebar-header{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid rgba(255,255,255,0.06);flex-shrink:0}
.sidebar-title{font-size:22px;font-weight:700;color:var(--text)}
.search-bar{display:flex;align-items:center;gap:8px;margin:8px 16px;background:rgba(255,255,255,0.06);border-radius:12px;padding:8px 12px;transition:background 0.2s ease}
.search-bar:focus-within{background:rgba(255,255,255,0.1)}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:15px;flex:1;font-family:inherit}
.search-bar input::placeholder{color:var(--text3)}
.search-bar svg{width:16px;height:16px;fill:var(--text3);flex-shrink:0}
.chat-list{flex:1;overflow-y:auto;padding:4px 8px}
.chat-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:14px;cursor:pointer;transition:background 0.15s ease;min-height:64px}
.chat-item:hover{background:rgba(255,255,255,0.06)}
.chat-item:active{background:rgba(255,255,255,0.1);transform:scale(0.99)}
.chat-item.active{background:rgba(100,210,255,0.12)}
.chat-item .avatar{width:48px;height:48px;flex-shrink:0;border-radius:50%;background:linear-gradient(135deg, rgba(100,210,255,0.3), rgba(90,200,250,0.15));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);font-size:18px;overflow:hidden;border:1px solid rgba(255,255,255,0.1)}
.chat-item .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-info{flex:1;overflow:hidden;min-width:0}
.chat-name-row{display:flex;align-items:center;justify-content:space-between}
.chat-name{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-time{font-size:12px;color:var(--text3);flex-shrink:0}
.chat-preview{font-size:14px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-unread{min-width:20px;height:20px;border-radius:10px;background:var(--accent);color:#000;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0}

/* ── Chat Main ── */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.chat-header{height:56px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;position:relative;z-index:5;
  background:linear-gradient(180deg, rgba(30,30,30,0.85) 0%, rgba(30,30,30,0.7) 100%);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border-bottom:0.5px solid rgba(255,255,255,0.1)}
.chat-header .avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg, rgba(100,210,255,0.3), rgba(90,200,250,0.15));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);font-size:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.1)}
.chat-header .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-header-info{flex:1;min-width:0}
.chat-header-name{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-header-sub{font-size:12px;color:var(--text2)}
.messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px}
.msg-wrap{display:flex;gap:8px;align-items:flex-end;max-width:75%}
.msg-wrap.own{flex-direction:row-reverse;align-self:flex-end}
.msg-wrap .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg, rgba(100,210,255,0.25), rgba(90,200,250,0.1));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);font-size:11px;overflow:hidden}
.msg-wrap .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.msg-bubble{padding:10px 14px;border-radius:18px;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.08);font-size:15px;line-height:1.45;position:relative;word-break:break-word;transition:background 0.15s ease}
.msg-wrap.own .msg-bubble{background:linear-gradient(135deg, rgba(100,210,255,0.25), rgba(90,200,250,0.2));border-color:rgba(100,210,255,0.2);border-bottom-right-radius:6px}
.msg-bubble:hover{background:rgba(255,255,255,0.09)}
.msg-wrap.own .msg-bubble:hover{background:rgba(100,210,255,0.3)}
.msg-sender{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:3px}
.msg-text{color:var(--text)}
.msg-footer{display:flex;align-items:center;gap:6px;margin-top:4px;justify-content:flex-end}
.msg-time{font-size:10px;color:var(--text3)}
.msg-edited{font-size:10px;color:var(--text3);font-style:italic}
.msg-reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.reaction-chip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:3px 8px;font-size:14px;cursor:pointer;transition:all 0.15s ease;display:flex;align-items:center;gap:3px}
.reaction-chip:hover{background:rgba(100,210,255,0.15);border-color:rgba(100,210,255,0.3);transform:scale(1.08)}
.reaction-count{font-size:11px;color:var(--text3)}
.msg-reply{border-left:2px solid var(--accent);padding:4px 8px;margin-bottom:5px;background:rgba(100,210,255,0.08);border-radius:0 10px 10px 0;cursor:pointer;font-size:12px}
.msg-reply-name{font-size:11px;font-weight:600;color:var(--accent)}
.msg-reply-text{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-media{margin-top:5px;border-radius:14px;overflow:hidden;max-width:280px}
.msg-media img,.msg-media video{width:100%;display:block;border-radius:14px}
.msg-file{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.05);border-radius:12px;margin-top:5px;cursor:pointer;transition:background 0.15s ease}
.msg-file:hover{background:rgba(255,255,255,0.08)}
.msg-file-info{flex:1;min-width:0}
.msg-file-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-file-size{font-size:11px;color:var(--text3)}
.msg-deleted{font-style:italic;color:var(--text3)}
.msg-ctx-menu{position:fixed;background:rgba(40,40,42,0.95);backdrop-filter:blur(40px) saturate(180%);border:0.5px solid rgba(255,255,255,0.15);border-radius:14px;padding:6px;z-index:50;box-shadow:0 16px 60px rgba(0,0,0,0.5);min-width:180px;animation:scaleIn 0.15s ease}
.msg-ctx-item{padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px;transition:background 0.1s ease}
.msg-ctx-item:hover{background:rgba(255,255,255,0.08)}
.msg-ctx-item.danger{color:var(--red)}
.msg-ctx-item.danger:hover{background:rgba(255,69,58,0.15)}
.day-separator{text-align:center;margin:16px 0;position:relative;color:var(--text3);font-size:12px;font-weight:600}
.day-separator::before{content:'';position:absolute;top:50%;left:0;right:0;height:0.5px;background:rgba(255,255,255,0.06)}
.day-separator span{background:rgba(20,20,22,0.8);position:relative;z-index:1;padding:0 12px;border-radius:8px}

/* ── Input ── */
.input-area{padding:10px 16px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;
  background:linear-gradient(180deg, rgba(30,30,30,0.7) 0%, rgba(30,30,30,0.85) 100%);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border-top:0.5px solid rgba(255,255,255,0.08);position:relative;z-index:5}
.msg-input-wrap{flex:1;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.08);border-radius:20px;display:flex;align-items:flex-end;padding:4px 4px 4px 14px;transition:background 0.2s ease}
.msg-input-wrap:focus-within{background:rgba(255,255,255,0.09)}
.msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:15px;resize:none;padding:8px 0;line-height:1.45;max-height:120px;overflow-y:auto}
.msg-input::placeholder{color:var(--text3)}
.send-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease;flex-shrink:0;background:var(--accent);color:#000}
.send-btn:hover{transform:scale(1.05)}
.send-btn:active{transform:scale(0.9)}
.send-btn svg{width:16px;height:16px;fill:currentColor}
.attach-btn{color:var(--text2);cursor:pointer;padding:6px;display:flex;align-items:center;transition:color 0.15s ease;flex-shrink:0}
.attach-btn:hover{color:var(--accent)}
.attach-btn svg{width:20px;height:20px;fill:currentColor}
.emoji-btn{color:var(--text2);cursor:pointer;padding:6px;display:flex;align-items:center;transition:color 0.15s ease;flex-shrink:0;position:relative}
.emoji-btn:hover{color:var(--accent)}
.emoji-btn svg{width:20px;height:20px;fill:currentColor}
.emoji-picker{position:absolute;bottom:calc(100% + 8px);right:0;background:rgba(40,40,42,0.95);backdrop-filter:blur(40px) saturate(180%);border:0.5px solid rgba(255,255,255,0.12);border-radius:16px;padding:10px;z-index:50;display:none;grid-template-columns:repeat(8,1fr);gap:4px;box-shadow:0 12px 40px rgba(0,0,0,0.4);animation:scaleIn 0.15s ease}
.emoji-picker.active{display:grid}
.emoji-cell{width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:10px;font-size:20px;transition:background 0.1s ease}
.emoji-cell:hover{background:rgba(255,255,255,0.1)}
.emoji-cell:active{transform:scale(0.85)}

/* ── Reply bar ── */
.reply-bar{display:none;align-items:center;gap:10px;padding:8px 16px;background:rgba(100,210,255,0.08);border-top:0.5px solid rgba(100,210,255,0.15)}
.reply-bar.active{display:flex;animation:slideUp 0.15s ease}
.reply-bar-content{flex:1}
.reply-bar-name{font-size:11px;font-weight:600;color:var(--accent)}
.reply-bar-text{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px}

/* ── Welcome ── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2)}
.welcome-text{font-size:15px}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);animation:fadeIn 0.2s ease}
.modal-overlay.active{display:flex}
.modal-card{background:rgba(40,40,42,0.95);backdrop-filter:blur(60px) saturate(200%);-webkit-backdrop-filter:blur(60px) saturate(200%);border:0.5px solid rgba(255,255,255,0.12);border-radius:20px;padding:24px;width:100%;max-width:440px;box-shadow:0 30px 80px rgba(0,0,0,0.5);animation:scaleIn 0.3s cubic-bezier(0.16,1,0.3,1);max-height:90vh;overflow-y:auto;margin:16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{cursor:pointer;color:var(--text2);display:flex;align-items:center;transition:color 0.15s ease}
.modal-close:hover{color:var(--text)}
.modal-close svg{width:20px;height:20px;fill:currentColor}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

.tabs-row{display:flex;gap:3px;margin-bottom:16px;background:rgba(0,0,0,0.3);border-radius:10px;padding:3px}
.tab-pill{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all 0.2s ease;border:none;background:transparent;font-family:inherit}
.tab-pill:hover{color:var(--text)}
.tab-pill.active{background:rgba(255,255,255,0.1);color:var(--text);box-shadow:0 2px 6px rgba(0,0,0,0.2)}
