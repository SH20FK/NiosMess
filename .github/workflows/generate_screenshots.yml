name: Generate Screenshots

on:
  workflow_dispatch:
  push:
    paths:
      - 'pulse_flutter/lib/screenshots/**'
      - 'pulse_flutter/test/screenshots_test.dart'

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pulse_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create output directory
        run: mkdir -p ../niosmess_landing/public/screens

      - name: Pub get
        run: flutter pub get

      - name: Generate raw screenshots
        run: flutter test test/screenshots_test.dart

      - name: Convert raw to PNG
        run: |
          python3 -c "
          import os
          from PIL import Image
          raw_dir = '../niosmess_landing/public/screens'
          for f in os.listdir(raw_dir):
              if f.endswith('.raw'):
                  path = os.path.join(raw_dir, f)
                  with open(path) as fp:
                      header = fp.readline().strip()
                      w, h = map(int, header.split(','))
                      data = fp.read()
                  img = Image.frombytes('RGBA', (w, h), data)
                  png_name = f.replace('.raw', '.png')
                  img.save(os.path.join(raw_dir, png_name))
                  os.remove(path)
                  print(f'Converted {png_name} ({w}x{h})')
          "

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: niosmess_landing/public/screens/
          if-no-files-found: error
