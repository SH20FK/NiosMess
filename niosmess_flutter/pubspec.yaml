name: niosmess
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.2
  firebase_core: ^3.5.0
  firebase_messaging: ^15.1.2
  flutter_displaymode: ^0.6.0
  path_provider: ^2.1.4
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.3
  record: ^5.1.2
  permission_handler: ^11.3.1
  just_audio: ^0.9.38
  file_picker: ^10.3.10
  geolocator: ^12.0.0
  flutter_contacts: ^1.1.9
  dynamic_color: ^1.7.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  share_plus: ^10.0.2
  image_picker: ^1.1.2
  crypto: ^3.0.3
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # Haptic feedback
  haptic_feedback: ^0.5.0
  
  # UI/UX enhancements
  animations: ^2.0.11
  lottie: ^3.1.2

  flutter_slidable: ^3.0.1
  
  # Audio waveform
  audio_waveforms: ^1.2.0
  
  # Open files with system handler
  open_filex: ^4.5.0

  # Video player for in-app media viewer
  video_player: ^2.9.2
  
  # Maps and location
  google_maps_flutter: ^2.10.0
  
  # Image loading
  blurhash: ^1.1.1
  flutter_blurhash: ^0.9.0
  
  # Image compression
  flutter_image_compress: ^2.3.0
  
  # Link preview
  flutter_linkify: ^6.0.0
  
  # Offline database
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  
  # Hive for offline storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Connectivity
  connectivity_plus: ^6.1.0
  
  # Intl for translations
  intl: ^0.20.2
  
  # HTTP client for AI
  http: ^1.2.2
  
  # Color picker for theme editor
  flutter_colorpicker: ^1.0.3
  
  # Charts for storage visualization
  fl_chart: ^0.68.0
  
  # Staggered grid for profile media
  flutter_staggered_grid_view: ^0.7.0
  window_manager: ^0.5.1
  screen_retriever: ^0.2.0

  # Desktop: drag & drop files from OS
  desktop_drop: ^0.4.4

  # Desktop: system tray icon
  tray_manager: ^0.2.3


dev_dependencies:

  flutter_launcher_icons: ^0.14.0
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13




flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#17212B"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#17212B"
    theme_color: "#17212B"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48


flutter:
  uses-material-design: true
  assets:
    - assets/legal/
    - assets/images/fox.png

dependency_overrides:
  record_linux: ^1.1.0
